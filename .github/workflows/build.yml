name: Build ZMK Firmware with JIS Conversion

on: [push, pull_request, workflow_dispatch]

jobs:
  # JISに置換
  prepare_jis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Automatically Convert US Keymap to JIS
        run: |
          KEYMAP_FILE="config/roBa.keymap"
          if [ -f "$KEYMAP_FILE" ]; then
            echo "Converting $KEYMAP_FILE from US to JIS layout..."
            
            # JIS化置換ルール
            sed -i 's/&kp AT/&kp MINUS/g'       $KEYMAP_FILE
            sed -i 's/&kp CARET/&kp EQUAL/g'    $KEYMAP_FILE
            sed -i 's/&kp AMPS/&kp CARET/g'     $KEYMAP_FILE
            sed -i 's/&kp ASTRK/&kp AMPS/g'     $KEYMAP_FILE
            sed -i 's/&kp LPAR/&kp ASTRK/g'     $KEYMAP_FILE
            sed -i 's/&kp RPAR/&kp LPAR/g'      $KEYMAP_FILE
            sed -i 's/&kp MINUS/&kp RPAR/g'     $KEYMAP_FILE
            sed -i 's/&kp EQUAL/&kp MINUS/g'    $KEYMAP_FILE
            sed -i 's/&kp PLUS/&kp SQT/g'       $KEYMAP_FILE
            
            sed -i 's/&kp LBKT/&kp REUSABLE_REPLACE_LBKT/g' $KEYMAP_FILE
            sed -i 's/&kp RBKT/&kp BSLH/g'      $KEYMAP_FILE
            sed -i 's/&kp REUSABLE_REPLACE_LBKT/&kp RBKT/g' $KEYMAP_FILE
            
            sed -i 's/&kp BSLH/&kp INTERNATIONAL_1/g' $KEYMAP_FILE
            sed -i 's/&kp SQT/&kp COLON/g'      $KEYMAP_FILE
            sed -i 's/&kp COLON/&kp ASTRK/g'    $KEYMAP_FILE
            sed -i 's/&kp SEMI/&kp PLUS/g'      $KEYMAP_FILE
            sed -i 's/&kp TILDE/&kp EQUAL/g'    $KEYMAP_FILE
            sed -i 's/&kp GRAVE/&kp SQT/g'      $KEYMAP_FILE
            
            echo "Conversion complete!"
          else
            echo "No keymap file found, skipping conversion."
          fi

      # JIS置換状態のフォルダ一式を「zmk-config」という名前で一時保存
      - name: Upload temporary converted config
        uses: actions/upload-artifact@v4
        with:
          name: zmk-config
          path: .
          include-hidden-files: true

  # Reusableを使いつつ、JIS化された一時フォルダを上書きで読込
  build:
    needs: prepare_jis
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3-branch
    with:
      # zmk-configで上書き
      build_matrix_path: "zmk-config"
      archive_name: "roBa_firmware"
    secrets: inherit
