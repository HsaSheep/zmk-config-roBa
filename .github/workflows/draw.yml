name: "Draw Keymap"

on:
  workflow_dispatch:
  # push時に自動で実行する場合は、以下のコメントアウトを外す
  # push:
  #   paths:
  #     - "config/roBa.keymap"
  #     - "keymap_drawer.config.yaml"
  #     - "config/roBa.dtsi"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@f9cf9d3677368a7fb1dc505c51b8156fafa66fe2
    permissions:
      contents: write
    with:
      commit_message: "[Draw] ${{ github.event.head_commit.message || 'Update keymap drawing' }}"
      amend_commit: false
      keymap_patterns: "config/*.keymap"
      json_path: "config"
      config_path: "keymap_drawer.config.yaml" # config file, ignored if not exists
      output_folder: "keymap-drawer"
      destination: "both"
      
  draw_png:
    runs-on: ubuntu-latest
    needs: draw # drawジョブ（SVG生成）が正常に終わった後に実行する
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # drawジョブがコミットした最新のSVGを取得するためにfetch
          ref: ${{ github.head_ref || github.ref }}

      - name: Install dependencies (rsvg-convert)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Convert SVG to PNG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # 変更をリモートから最新状態に更新
          git stash
          git pull origin ${{ github.head_ref || github.ref }} --rebase
          git stash pop
          # keymap-drawer フォルダ内のSVGをすべてPNGに変換
          for svg in keymap-drawer/*.svg; do
            if [ -f "$svg" ]; then
              png="${svg%.svg}.png"
              # -w 1200 で横幅1200pxに指定（お好みのサイズに変更可能）
              rsvg-convert -w 1200 -o "$png" "$svg"
              echo "Converted $svg to $png"
            fi
          done

      - name: Commit and Push PNG files
        run: |
          #git config --global user.name "github-actions[bot]"
          #git config --global user.email "github-actions[bot]@://github.com"
          
          # 変更をリモートから最新状態に更新
          git stash
          git pull origin ${{ github.head_ref || github.ref }} --rebase
          git stash pop

          git add keymap-drawer/*.png
          # 差分がある場合のみコミットしてPush
          git diff --quiet && git diff --staged --quiet || (git commit -m "[Draw] Auto-generate PNG keymaps" && git push origin HEAD:${{ github.head_ref || github.ref }})
